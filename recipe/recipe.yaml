schema_version: 1

context:
  python_min: "3.11"
  version: "0.4.2"

package:
  name: pystormtracker
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/P/PyStormTracker/pystormtracker-${{ version }}.tar.gz
  sha256: 6dab77dc3c54c3bd7c513b50bafa3cdba4c654e2c516b980fe530ca93ead0ff5

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - stormtracker = pystormtracker.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - dask-core >=2024.1.0
    - h5netcdf >=1.0.0
    - numpy >=1.24.0
    - numba >=0.60.0
    - xarray >=2024.9.0
    - cfgrib >=0.9.15.1
    - mpi4py >=4.1.0
    - netcdf4 >=1.6.1

tests:
  - python:
      python_version:
        - ${{ python_min }}.*
        - "*"
      imports:
        - pystormtracker
      pip_check: true
  - script:
      - stormtracker --help
      - pytest --run-all
    requirements:
      run:
        - pytest >=9.0.2
        - pooch >=1.9.0
    files:
      source:
        - tests/
        - data/test/tracks/

about:
  summary: A High-Performance Cyclone Tracker in Python
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://pypi.org/project/PyStormTracker/

extra:
  recipe-maintainers:
    - mwyau
